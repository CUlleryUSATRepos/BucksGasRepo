<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Philadelphia Gas Prices</title>
</head>
<body>
  <div id="table"></div>

  <script>
    fetch("Philadelphia_PA_only_avg.csv")
      .then(r => r.text())
      .then(text => {
        const rows = text.trim().split("\n").map(r => r.split(","));
        let html = "<table border='1' style='border-collapse:collapse;font-family:Arial;'>";

        rows.forEach((row, i) => {
          html += "<tr>";
          row.forEach(cell => {
            html += i === 0 
              ? `<th style="padding:6px;background:#eee;">${cell}</th>` 
              : `<td style="padding:6px;">${cell}</td>`;
          });
          html += "</tr>";
        });

        html += "</table>";
        document.getElementById("table").innerHTML = html;
      });
  </script>
</body>
</html>
